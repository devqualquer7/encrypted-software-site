<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>EncryptedSoftware · Autorização Mercado Pago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #060610;
    --card:      #0b0b16;
    --card2:     #11111f;
    --border:    #1c1c33;
    --border-hi: #3a1a30;
    --red:       #ff2b4a;
    --red-deep:  #cc1b35;
    --green:     #00e396;
    --yellow:    #ffc83d;
    --blue:      #4ea8f7;
    --text:      #e4e4f4;
    --dim:       #9a9ab5;
    --muted:     #52526e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(28,28,51,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28,28,51,0.3) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* Top red glow */
  body::after {
    content: '';
    position: fixed;
    top: -40vh; left: 50%;
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse, rgba(255,43,74,0.12) 0%, transparent 65%);
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
    animation: slideDown 0.6s ease-out;
  }

  .brand-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
  }
  .brand-title .white { color: var(--text); }
  .brand-title .red   { color: var(--red); }

  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: rgba(11, 11, 22, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.6s ease-out 0.1s backwards;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .card::before {
    content: '';
    position: absolute;
    inset-inline: 0; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,43,74,0.7), transparent);
  }

  .status-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 34px;
    font-weight: bold;
  }
  .status-icon.success {
    background: rgba(0,227,150,0.1);
    border: 1px solid rgba(0,227,150,0.4);
    color: var(--green);
    box-shadow: 0 0 30px rgba(0,227,150,0.3);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s backwards;
  }
  .status-icon.error {
    background: rgba(255,43,74,0.1);
    border: 1px solid rgba(255,43,74,0.4);
    color: var(--red);
  }
  .status-icon.pending {
    background: rgba(78,168,247,0.1);
    border: 1px solid rgba(78,168,247,0.4);
    color: var(--blue);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  h1.success { color: var(--green); }
  h1.error   { color: var(--red); }
  h1.pending { color: var(--blue); }

  .subtitle {
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .code-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    font-size: 14px;
    word-break: break-all;
    line-height: 1.6;
    margin-bottom: 14px;
    user-select: all;
    -webkit-user-select: all;
    cursor: text;
    position: relative;
  }

  .code-box.pulse {
    animation: glow-pulse 2.5s ease-in-out infinite;
  }

  .btn {
    width: 100%;
    background: var(--red-deep);
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--red); box-shadow: 0 0 20px rgba(255,43,74,0.4); }
  .btn:active { transform: scale(0.98); }
  .btn.success { background: rgba(0,227,150,0.12); color: var(--green); border: 1px solid rgba(0,227,150,0.3); }
  .btn.success:hover { background: rgba(0,227,150,0.2); }

  .instructions {
    background: rgba(78,168,247,0.06);
    border: 1px solid rgba(78,168,247,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 20px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--dim);
  }
  .instructions strong { color: var(--text); }
  .instructions .num {
    display: inline-block;
    width: 20px; height: 20px;
    background: rgba(78,168,247,0.15);
    color: var(--blue);
    border-radius: 50%;
    text-align: center;
    line-height: 20px;
    font-weight: bold;
    margin-right: 6px;
    font-size: 11px;
  }

  .footer {
    margin-top: 32px;
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
  }

  .copied-toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(0,227,150,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 18px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    z-index: 10;
    opacity: 0;
    transition: all 0.3s ease-out;
    pointer-events: none;
    backdrop-filter: blur(10px);
  }
  .copied-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(0,227,150,0); }
    50%      { box-shadow: 0 0 25px rgba(0,227,150,0.25); }
  }

  /* Scan line effect */
  .card.success::after {
    content: '';
    position: absolute;
    inset-inline: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scan 4s linear infinite;
  }
  @keyframes scan {
    0%   { transform: translateY(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(400px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-title">
      <span class="white">ENCRYPTED</span><span class="red">SOFTWARE</span>
    </div>
    <div class="brand-sub">Autorização Mercado Pago</div>
  </div>

  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>

  <div class="footer">🔒 Conexão segura via OAuth 2.0 · Mercado Pago</div>
</div>

<div class="copied-toast" id="toast">✓ Código copiado!</div>

<script>
  const card = document.getElementById('card')
  const toast = document.getElementById('toast')

  function showToast(msg) {
    toast.textContent = '✓ ' + msg
    toast.classList.add('show')
    setTimeout(() => toast.classList.remove('show'), 2200)
  }

  function copyText(txt) {
    navigator.clipboard.writeText(txt)
      .then(() => showToast('Código copiado!'))
      .catch(() => {
        // Fallback for older browsers
        const ta = document.createElement('textarea')
        ta.value = txt; document.body.appendChild(ta)
        ta.select(); document.execCommand('copy')
        document.body.removeChild(ta)
        showToast('Código copiado!')
      })
  }

  const params = new URLSearchParams(window.location.search)
  const code   = params.get('code')
  const error  = params.get('error_description') || params.get('error')

  if (error) {
    card.classList.add('error')
    card.innerHTML = `
      <div class="status-icon error">✗</div>
      <h1 class="error">Autorização Negada</h1>
      <p class="subtitle">Não foi possível obter a autorização:<br>
        <strong style="color:var(--red)">${decodeURIComponent(error)}</strong></p>
      <p style="color:var(--dim);font-size:12px;text-align:center;margin-top:20px">
        Feche esta janela e tente novamente no software.
      </p>
    `
  } else if (code) {
    card.classList.add('success')
    card.innerHTML = `
      <div class="status-icon success">✓</div>
      <h1 class="success">Autorização Concluída</h1>
      <p class="subtitle">
        Copie o código abaixo e envie para quem te mandou este link
      </p>

      <div class="label">▸ Código de autorização</div>
      <div class="code-box pulse" id="code">${code}</div>

      <button class="btn success" onclick="copyText('${code}')">
        📋 COPIAR CÓDIGO
      </button>

      <div class="instructions">
        <div style="margin-bottom:10px"><strong>Próximos passos:</strong></div>
        <div><span class="num">1</span>Copie o código acima (botão ou seleção manual)</div>
        <div><span class="num">2</span>Envie de volta via WhatsApp / mesma conversa</div>
        <div><span class="num">3</span>Importante: envie em até <strong style="color:var(--yellow)">10 minutos</strong> (depois disso expira)</div>
      </div>
    `

    // Auto-copy attempt
    setTimeout(() => {
      try { copyText(code) } catch(_) {}
    }, 600)

  } else {
    card.classList.add('pending')
    card.innerHTML = `
      <div class="status-icon pending">?</div>
      <h1 class="pending">Aguardando Autorização</h1>
      <p class="subtitle">
        Esta página deve ser acessada através de um link enviado pelo software.
      </p>
      <p style="color:var(--muted);font-size:11px;text-align:center;margin-top:20px;font-family:'JetBrains Mono',monospace">
        Se você chegou aqui por engano, pode fechar esta janela.
      </p>
    `
  }
</script>

</body>
</html>
